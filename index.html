<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- DEMO ONLY: remove this line once the client approves and the site goes live -->
  <meta name="robots" content="noindex" />

  <title>Bunga Tole Florist — Fresh Flowers in Cikini, Jakarta</title>
  <meta name="description" content="Bunga Tole Florist — fresh bouquets, wedding florals, and standing arrangements at Pasar Kembang, Cikini, Jakarta Pusat. Order anytime via WhatsApp." />
  <meta name="theme-color" content="#faf8f5" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%237a2333'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Icon sprite, referenced via <use> — no icon library -->
  <svg style="display:none" aria-hidden="true">
    <symbol id="icon-whatsapp" viewBox="0 0 24 24">
      <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.87 9.87 0 0 0 12.04 2Zm0 18.15a8.2 8.2 0 0 1-4.19-1.14l-.3-.18-3.12.82.83-3.04-.2-.32a8.13 8.13 0 0 1-1.25-4.38c0-4.54 3.7-8.24 8.25-8.24 2.2 0 4.26.86 5.82 2.42a8.16 8.16 0 0 1 2.41 5.83c0 4.54-3.7 8.23-8.25 8.23Zm4.52-6.16c-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.01-.37-1.92-1.18a7.2 7.2 0 0 1-1.33-1.65c-.14-.24-.02-.37.1-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.31-.74-1.79-.19-.47-.39-.41-.54-.42h-.46c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2.01 0 1.19.86 2.34.98 2.5.12.16 1.7 2.6 4.14 3.63.57.25 1.02.4 1.37.51.58.18 1.1.16 1.51.1.46-.07 1.42-.58 1.62-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28Z" />
    </symbol>
    <symbol id="icon-pin" viewBox="0 0 24 24">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z" />
    </symbol>
  </svg>

  <main>
    <!-- 1. HERO -->
    <section class="hero" id="hero">
      <img class="hero__image" id="hero-image" src="" alt="" loading="eager" fetchpriority="high" />
      <div class="hero__scrim"></div>
      <div class="hero__content container">
        <p class="eyebrow hero__eyebrow" data-hook="hero-eyebrow"></p>
        <h1 class="hero__heading" data-hook="hero-heading"></h1>
        <p class="hero__subheading" data-hook="hero-subheading"></p>
        <a class="btn btn--whatsapp" id="hero-cta" href="#" target="_blank" rel="noopener">
          <svg class="icon" aria-hidden="true"><use href="#icon-whatsapp"></use></svg>
          <span data-hook="hero-cta-label"></span>
        </a>
        <p class="hero__rating" data-hook="hero-rating"></p>
      </div>
    </section>

    <!-- 2. ABOUT -->
    <section class="section" id="about">
      <div class="container">
        <div class="about__grid">
          <img class="about__image fade-in" id="about-image" src="" alt="" loading="lazy" width="1000" height="1250" />
          <div class="fade-in">
            <h2 class="section-heading" data-hook="about-heading"></h2>
            <p class="about__body" data-hook="about-body"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- 3. GALLERY / CATALOG -->
    <section class="section section--alt" id="gallery">
      <div class="container">
        <h2 class="section-heading fade-in" data-hook="gallery-heading"></h2>
        <div class="gallery__grid" id="gallery-grid"></div>
      </div>
    </section>

    <!-- 4. HOURS & LOCATION -->
    <section class="section" id="info">
      <div class="container">
        <div class="info__grid">
          <div class="fade-in">
            <h2 class="section-heading" data-hook="info-heading"></h2>
            <dl class="info__details">
              <dt data-hook="info-hours-label"></dt>
              <dd data-hook="info-hours"></dd>
              <dd data-hook="info-hours-note"></dd>

              <dt data-hook="info-address-label"></dt>
              <dd><address data-hook="info-address"></address></dd>

              <dt data-hook="info-whatsapp-label"></dt>
              <dd><a id="info-phone-link" href="#" data-hook="info-phone-label"></a></dd>
            </dl>
            <div class="info__actions">
              <a class="btn btn--whatsapp" id="info-cta" href="#" target="_blank" rel="noopener">
                <svg class="icon" aria-hidden="true"><use href="#icon-whatsapp"></use></svg>
                <span data-hook="info-cta-label"></span>
              </a>
              <a class="btn btn--outline" id="directions-cta" href="#" target="_blank" rel="noopener">
                <svg class="icon" aria-hidden="true"><use href="#icon-pin"></use></svg>
                <span data-hook="info-directions-label"></span>
              </a>
            </div>
          </div>
          <div class="map-frame fade-in">
            <iframe id="map-iframe" src="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Bunga Tole Florist location on Google Maps"></iframe>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 5. STICKY FLOATING WHATSAPP BUTTON -->
  <a class="sticky-whatsapp" id="sticky-whatsapp" href="#" target="_blank" rel="noopener" aria-label="Order via WhatsApp">
    <svg class="icon" aria-hidden="true"><use href="#icon-whatsapp"></use></svg>
  </a>

  <!-- 6. FOOTER -->
  <footer class="footer" id="footer">
    <div class="container">
      <p class="footer__brand" data-hook="footer-brand"></p>
      <p class="footer__tagline" data-hook="footer-tagline"></p>

      <div class="footer__grid">
        <div>
          <p class="footer__heading" data-hook="footer-contact-label"></p>
          <p><a id="footer-phone-link" href="#" data-hook="footer-phone-label"></a></p>
        </div>
        <div>
          <p class="footer__heading" data-hook="footer-address-label"></p>
          <p data-hook="footer-address"></p>
        </div>
        <div>
          <p class="footer__heading" data-hook="footer-hours-label"></p>
          <p data-hook="footer-hours"></p>
        </div>
      </div>

      <p class="footer__bottom" data-hook="footer-bottom"></p>
    </div>
  </footer>

  <script src="content.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
